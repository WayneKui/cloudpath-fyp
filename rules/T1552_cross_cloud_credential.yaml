id: T1552
mitre_name: Unsecured Credentials - Potential Cross-Cloud Credential Exposure
tactic: Credential Access
severity: critical
description: >
  An AWS Secrets Manager secret is structurally linked to one or more GCP service accounts as a potential cross-cloud credential. If an attacker compromises an AWS resource with secretsmanager:GetSecretValue, they could extract the secret and, if it contains GCP credentials, pivot into the GCP environment.

detections:
  - cloud: aws
    cypher: |
      // Detect AWS secrets that have been linked (via the synthetic
      // CONTAINS_CREDENTIAL_FOR edge) to a GCP service account. Returns
      // ONE row per secret, aggregating all linked SAs into the detail
      // field. This prevents the chainer from seeing the same secret as
      // multiple separate detections when it links to several SAs.
      MATCH (s:SecretsManagerSecret)-[r:CONTAINS_CREDENTIAL_FOR]->(sa:GCPServiceAccount)
      WITH s, collect(DISTINCT sa.email) AS linked_sas,
              collect(DISTINCT r.confidence)[0] AS top_confidence
      RETURN s.arn AS node_id,
             'SecretsManagerSecret' AS node_type,
             'links to ' + toString(size(linked_sas))
               + ' GCP SA(s), top confidence: ' + coalesce(top_confidence, 'unknown') AS detail