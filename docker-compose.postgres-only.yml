services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudpath-postgres
    ports:
      # Host port 15432 -> container port 5432. Many Windows Docker
      # Desktop installations reserve TCP port ranges in the 5000-6000
      # area for Hyper-V / WSL2, which blocks binding to 5432/5433.
      # Port 15432 is outside the common reserved ranges and is a
      # widely-used "PostgreSQL on Windows in Docker" convention.
      - "15432:5432"
    environment:
      POSTGRES_USER: cloudpath
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: cloudpath
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # schema.sql is mounted into PostgreSQL's init directory. It runs
      # ONLY when the volume is empty (first init). Subsequent restarts
      # skip it. To reapply schema changes you must either:
      #   docker-compose down -v        (wipes volume, reruns schema)
      #   or apply manually via psql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudpath -d cloudpath"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  neo4j:
    image: neo4j:5-community
    container_name: neo4j-fyp
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_SIZE:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_SIZE:-512m}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-256m}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
